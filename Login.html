<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>
</head>
<body>
  <header>
    <h1 style="color:red  ;">Welcome to My Website</h1>
  </header>
  <main>
    <h2>Login Form</h2>
    <form>
      <label for="name">Name:</label>
      <input type="text" id="name" name="name">
      <br><br>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email">
      <br><br>

      <label for="password">Password:</label>
      <input type="password" id="password" name="password">
      <br><br>

      <label>Gender:</label>
      <input type="radio" id="male" name="gender" value="male">
      <label for="male">Male</label>
      <input type="radio" id="female" name="gender" value="female">
      <label for="female">Female</label>
      <br><br>

      <label>Hobbies:</label>
      <input type="checkbox" id="reading" name="hobbies" value="reading">
      <label for="reading">Reading</label>
      <input type="checkbox" id="gaming" name="hobbies" value="gaming">
      <label for="gaming">Gaming</label>
      <input type="checkbox" id="sports" name="hobbies" value="sports">
      <label for="sports">Sports</label>
      <br><br>

      <label for="city">City:</label>
      <select id="city" name="city">
        <option value="">--Select City--</option>
        <option value="newyork">New York</option>
        <option value="losangeles">Los Angeles</option>
        <option value="chicago">Chicago</option>
        <option value="houston">Houston</option>
        <option value="miami">Miami</option>
      </select>
      <br><br>

      <textarea id="comments" name="comments" rows="4" cols="15" placeholder="Enter your comments here..."></textarea>
      <br><br>
      <input type="submit" value="Submit">
    </form>
  </main>
  <footer>
    <p>&copy; 2026 My Website</p>
    <!-- Example of embedding an external website using an iframe -->
    <iframe src="https://batman-18praveen.lovable.app/" width="400" height="200" title="Example Site"></iframe>
    <!-- Example of embedding a video using the video tag -->
    <video width="320" height="240" controls>
      <source src="virat paglu.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </footer>
</body>
</html>
